name: Build

# https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions#concurrency
concurrency: 
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'

# ĐÚNG THEO KHUYẾN NGHỊ GITHUB: Ép hệ thống chuyển dịch sang Node 24 để tắt hoàn toàn cảnh báo lỗi thời
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # SỬA: Nâng cấp lên @v4 để sử dụng môi trường Node mới thay thế cho @master cũ kỹ
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: "src"

      # SỬA: Nâng cấp lên @v4 để đồng bộ
      - name: Checkout builds
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"
      
      - name: Clean old builds
        run: rm -f $GITHUB_WORKSPACE/builds/*.cs3

      # SỬA: Nâng cấp lên @v4 (Hỗ trợ cấu trúc Node mới và Java 21)
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      # SỬA: Nâng cấp lên @v3 nhằm đảm bảo tính tương thích
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds
          cp $GITHUB_WORKSPACE/src/build/plugins.json $GITHUB_WORKSPACE/builds/

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "Build $GITHUB_SHA" || exit 0   
          git push --force
